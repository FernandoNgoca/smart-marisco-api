spring:
  application:
    name: smart-marisco-api

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sm_bd?serverTimezone=UTC
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Europe/Lisbon

server:
  servlet:
    context-path: /smart-marisco-api

logging:
  level:
    mz.com.sgp: DEBUG

cors:
  originPatterns: http://localhost:4200